<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact us for inquiries about Cameron Highlands travel guides and tips.">
    <meta name="keywords" content="Contact, Cameron Highlands, Travel, Support">
    <title>Contact Us - Cameron Highlands</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Contact Us</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Get in Touch</h2>
            <p>Have questions about your upcoming trip? Fill out the form below and we will get back to you as soon as possible.</p>
            
            <form id="contactForm" action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
                
                <div class="form-footer">
                    <input type="submit" value="Send Message" class="submit-btn">
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Cameron Highlands Travel Guide. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            const name = document.getElementById('name').value;
            if (name) {
                alert(`Thank you, ${name}! Your message has been sent successfully.`);
            }
        });
    </script>
</body>
</html>
